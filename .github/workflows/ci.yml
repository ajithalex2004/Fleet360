name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Build-time env. CI uses dummies — real values come from prod secrets.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci_mock?sslmode=disable
      SESSION_SECRET: ci-session-secret-must-be-at-least-32-chars-long
      THESYS_API_KEY: ci-dummy-thesys-key
      OPENAI_API_KEY: ci-dummy-openai-key
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        # --legacy-peer-deps because the dependency tree has a known
        # peer-conflict: @crayonai/react-core@0.7.6 (transitive via
        # @thesysai/genui-sdk + @crayonai/react-ui) declares
        # peer zustand@^4.5.5 while the root project depends on
        # zustand@^5.0.8. Both versions resolve fine at runtime; npm's
        # strict resolution refuses. Remove this flag once the upstream
        # @crayonai/react-core publishes a version with `peer zustand@5`.
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true   # TODO(KNOWN-TS-001): re-enforce after pre-existing
                                   # ESLint warnings are cleaned up.

      - name: Typecheck (advisory)
        run: npm run typecheck
        continue-on-error: true   # TODO(KNOWN-TS-001): the codebase has ~100 pre-existing
                                   # TS errors (prisma/seed.ts, scripts/, admin pages).
                                   # Re-enforce once cleanup PR lands.

      - name: Unit tests
        run: npm run test:unit
        continue-on-error: true   # TODO(KNOWN-TS-001): re-enforce after typecheck does.

      - name: Build (Next.js)
        run: npm run build
