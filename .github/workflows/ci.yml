name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Build-time env. CI uses dummies — real values come from prod secrets.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci_mock?sslmode=disable
      SESSION_SECRET: ci-session-secret-must-be-at-least-32-chars-long
      THESYS_API_KEY: ci-dummy-thesys-key
      OPENAI_API_KEY: ci-dummy-openai-key
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build (Next.js)
        run: npm run build
