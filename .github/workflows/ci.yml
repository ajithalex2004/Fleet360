name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Build-time env. CI uses dummies — real values come from prod secrets.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci_mock?sslmode=disable
      SESSION_SECRET: ci-session-secret-must-be-at-least-32-chars-long
      SSO_ENCRYPTION_KEY: ci-sso-secret-must-be-at-least-32-chars-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      THESYS_API_KEY: ci-dummy-thesys-key
      OPENAI_API_KEY: ci-dummy-openai-key
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Production readiness script syntax
        run: node scripts/check-production-readiness.mjs
        continue-on-error: true   # CI uses a mock non-Neon DATABASE_URL; production env runs this as a gate.

      - name: Lint
        run: npm run lint
        continue-on-error: true   # TODO(KNOWN-TS-001): re-enforce after pre-existing
                                   # ESLint warnings are cleaned up.

      - name: Typecheck (advisory)
        run: npm run typecheck
        continue-on-error: true   # TODO(KNOWN-TS-001): the codebase has ~100 pre-existing
                                   # TS errors (prisma/seed.ts, scripts/, admin pages).
                                   # Re-enforce once cleanup PR lands.

      - name: Unit tests
        run: npm run test:unit
        continue-on-error: true   # TODO(KNOWN-TS-001): re-enforce after typecheck does.

      - name: Build (Next.js)
        run: npm run build

      - name: Deploy readiness command shape
        run: node --check scripts/check-deploy-readiness.mjs
